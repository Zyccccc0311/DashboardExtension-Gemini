<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau MCP Chat</title>
    <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api@master/lib/tableau.extensions.1.latest.js"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --panel: #ffffff;
            --line: #d9dee5;
            --text: #1f2933;
            --muted: #5f6c7b;
            --accent: #1769c2;
            --accent-soft: #eaf3fc;
            --user: #edf5ff;
            --assistant: #ffffff;
            --ok: #177a4d;
            --danger: #b93838;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            padding: 12px;
        }

        .app {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            height: calc(100vh - 24px);
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: var(--panel);
        }

        .sidebar {
            border-right: 1px solid var(--line);
            background: #fbfcfd;
            overflow: auto;
            padding: 12px;
        }

        .main {
            min-width: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            background: #fff;
        }

        .header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            background: #fff;
        }

        .title {
            margin: 0;
            font-size: 18px;
            font-weight: 800;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .status-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 30px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #f5f7fa;
            color: var(--muted);
            font-size: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a7b6c7;
        }

        .dot.active {
            background: var(--ok);
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 12px;
            color: #6f7e8c;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .datasource-list {
            display: grid;
            gap: 10px;
        }

        .datasource-card {
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
        }

        .datasource-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .mini {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
        }

        .messages {
            overflow: auto;
            padding: 14px;
            display: grid;
            gap: 12px;
            align-content: start;
            background: #fafbfd;
        }

        .message {
            max-width: min(900px, 100%);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: var(--assistant);
        }

        .message.user {
            justify-self: end;
            background: var(--user);
        }

        .message-role {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6f7e8c;
            margin-bottom: 8px;
        }

        .message-text {
            white-space: pre-wrap;
            line-height: 1.65;
            font-size: 14px;
            word-break: break-word;
        }

        .message-block + .message-block {
            margin-top: 12px;
        }

        details {
            border-top: 1px solid #eef1f4;
            padding-top: 10px;
        }

        details summary {
            cursor: pointer;
            color: #6f7e8c;
            font-size: 12px;
            font-weight: 700;
        }

        .audit-list {
            margin-top: 8px;
            display: grid;
            gap: 8px;
        }

        .audit-item {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 8px 10px;
            background: #fff;
        }

        .audit-step {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .audit-details {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .table-shell {
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: hidden;
            background: #fff;
        }

        .table-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--line);
            background: #f5f7fa;
            color: var(--muted);
            font-size: 12px;
        }

        .table-wrapper {
            max-height: 320px;
            overflow: auto;
        }

        table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 12px;
        }

        th, td {
            padding: 9px 10px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            vertical-align: top;
        }

        th {
            background: #f5f7fa;
            color: var(--muted);
            font-weight: 700;
        }

        td {
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .composer {
            border-top: 1px solid var(--line);
            padding: 12px;
            background: #fff;
        }

        .composer-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 70px;
            max-height: 180px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
            color: var(--text);
        }

        button {
            min-height: 42px;
            border: none;
            border-radius: 6px;
            padding: 0 16px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        #send-btn {
            background: var(--accent);
            color: #fff;
        }

        #clear-btn {
            background: #eef2f6;
            color: var(--text);
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: 220px minmax(0, 1fr);
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--line);
            }

            .composer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <h2 class="section-title">Dashboard Context</h2>
            <div id="datasource-list" class="datasource-list">
                <div class="datasource-card">
                    <div class="mini">正在读取 dashboard 数据源...</div>
                </div>
            </div>
        </aside>

        <section class="main">
            <div class="header">
                <h1 class="title">Tableau MCP Chat</h1>
                <p class="subtitle">把问题、OpenAPI 说明、MCP tool 描述和当前 dashboard datasource metadata 一起交给 Gemini，让它像 Claude 那样自行规划和查询。</p>
                <div class="status-row">
                    <div class="chip">
                        <span id="tableau-dot" class="dot"></span>
                        <span id="tableau-status">Tableau 未连接</span>
                    </div>
                    <div class="chip">
                        <span id="mcp-dot" class="dot"></span>
                        <span id="mcp-status">MCP 未连接</span>
                    </div>
                </div>
            </div>

            <div id="messages" class="messages"></div>

            <div class="composer">
                <div class="composer-grid">
                    <textarea id="prompt-input" placeholder="例如：查看每一年每个 Segment 的利润排名前十的产品"></textarea>
                    <button id="send-btn" disabled>发送</button>
                    <button id="clear-btn">新对话</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const datasourceList = document.getElementById('datasource-list');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const tableauDot = document.getElementById('tableau-dot');
        const tableauStatus = document.getElementById('tableau-status');
        const mcpDot = document.getElementById('mcp-dot');
        const mcpStatus = document.getElementById('mcp-status');

        let dashboardMetaPromise = null;
        let currentDashboardMeta = [];
        let chatHistory = [];

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDisplayValue(value) {
            if (value === null || value === undefined) return '';
            if (Array.isArray(value)) return value.map((item) => formatDisplayValue(item)).join(' | ');
            if (typeof value === 'object') return Object.entries(value).map(([key, item]) => `${key}: ${formatDisplayValue(item)}`).join(', ');
            return String(value);
        }

        function collectHeaders(rows) {
            if (!Array.isArray(rows) || !rows.length) return [];
            const headers = [];
            rows.forEach((row) => {
                Object.keys(row || {}).forEach((key) => {
                    if (!headers.includes(key)) headers.push(key);
                });
            });
            return headers;
        }

        function setChip(active, dotEl, textEl, text) {
            dotEl.classList.toggle('active', active);
            textEl.textContent = text;
        }

        function renderDatasourcePanel(items) {
            if (!items.length) {
                datasourceList.innerHTML = `
                    <div class="datasource-card">
                        <div class="mini">当前没有读取到 dashboard 数据源。</div>
                    </div>
                `;
                return;
            }

            datasourceList.innerHTML = items.map((item) => `
                <div class="datasource-card">
                    <div class="datasource-name">${escapeHtml(item.datasourceName)}</div>
                    <div class="mini">Worksheet: ${escapeHtml(item.worksheetName)}</div>
                    <div class="mini">Fields: ${escapeHtml((item.fields || []).slice(0, 8).join(', '))}${(item.fields || []).length > 8 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        function renderTable(rows) {
            if (!Array.isArray(rows) || !rows.length) return '';
            const headers = collectHeaders(rows);
            return `
                <div class="table-shell">
                    <div class="table-meta">
                        <span>${rows.length} rows</span>
                        <span>结果表</span>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>${headers.map((header) => `<th>${escapeHtml(header)}</th>`).join('')}</tr>
                            </thead>
                            <tbody>
                                ${rows.map((row) => `
                                    <tr>
                                        ${headers.map((header) => {
                                            const value = formatDisplayValue(row[header]);
                                            return `<td title="${escapeHtml(value)}">${escapeHtml(value)}</td>`;
                                        }).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderAudit(audit) {
            if (!Array.isArray(audit) || !audit.length) return '';
            return `
                <details class="message-block">
                    <summary>执行轨迹</summary>
                    <div class="audit-list">
                        ${audit.map((item) => `
                            <div class="audit-item">
                                <div class="audit-step">${escapeHtml(item.step)}</div>
                                <div class="audit-details">${escapeHtml(item.details)}</div>
                            </div>
                        `).join('')}
                    </div>
                </details>
            `;
        }

        function appendMessage(message) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${message.role}`;
            wrapper.innerHTML = `
                <div class="message-role">${message.role === 'user' ? 'User' : 'Assistant'}</div>
                <div class="message-text">${escapeHtml(message.content || '')}</div>
                ${message.data?.length ? `<div class="message-block">${renderTable(message.data)}</div>` : ''}
                ${renderAudit(message.audit)}
            `;
            messagesEl.appendChild(wrapper);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function resetConversation() {
            chatHistory = [];
            messagesEl.innerHTML = '';
            appendMessage({
                role: 'assistant',
                content: '准备好了。你可以直接问业务问题，我会结合 OpenAPI、MCP tool 描述和当前 dashboard metadata 来查询。'
            });
        }

        async function extractDashboardMeta() {
            const dashboard = tableau.extensions.dashboardContent.dashboard;
            const groups = await Promise.all(
                dashboard.worksheets.map(async (worksheet) => {
                    const datasources = await worksheet.getDataSourcesAsync();
                    return datasources.map((datasource) => ({
                        worksheetName: worksheet.name,
                        datasourceName: datasource.name,
                        localId: datasource.id,
                        fields: (datasource.fields || []).map((field) => field.name)
                    }));
                })
            );
            return groups.flat();
        }

        async function loadDashboardMeta() {
            if (dashboardMetaPromise) return dashboardMetaPromise;

            dashboardMetaPromise = extractDashboardMeta()
                .then((items) => {
                    currentDashboardMeta = items;
                    renderDatasourcePanel(items);
                    return items;
                })
                .finally(() => {
                    dashboardMetaPromise = null;
                });

            return dashboardMetaPromise;
        }

        async function refreshMcpStatus() {
            try {
                const response = await fetch('/api/status');
                const json = await response.json();
                if (!response.ok) throw new Error(json.error || `HTTP ${response.status}`);
                setChip(true, mcpDot, mcpStatus, `MCP 已连接 · ${json.toolCount} tools`);
                return true;
            } catch (error) {
                setChip(false, mcpDot, mcpStatus, `MCP 连接失败: ${error.message}`);
                return false;
            }
        }

        async function initialize() {
            const mcpReady = await refreshMcpStatus();

            try {
                await tableau.extensions.initializeAsync();
                setChip(true, tableauDot, tableauStatus, 'Tableau 已连接');
                await loadDashboardMeta();
                tableau.extensions.dashboardContent.dashboard.worksheets.forEach((worksheet) => {
                    worksheet.addEventListener(tableau.TableauEventType.FilterChanged, () => {
                        loadDashboardMeta().catch((error) => console.error('Failed to refresh dashboard metadata', error));
                    });
                });
                sendBtn.disabled = !mcpReady;
            } catch (error) {
                setChip(false, tableauDot, tableauStatus, `Tableau 初始化失败: ${error.message}`);
                sendBtn.disabled = true;
            }

            resetConversation();
        }

        async function sendMessage() {
            const content = promptInput.value.trim();
            if (!content) return;

            appendMessage({ role: 'user', content });
            chatHistory.push({ role: 'user', content });
            promptInput.value = '';
            sendBtn.disabled = true;

            try {
                await loadDashboardMeta();
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: content,
                        history: chatHistory.slice(-8),
                        dashboardMeta: currentDashboardMeta
                    })
                });
                const json = await response.json();
                if (!response.ok) throw new Error(json.error || `HTTP ${response.status}`);

                const assistantMessage = {
                    role: 'assistant',
                    content: json.message || 'No response returned.',
                    data: Array.isArray(json.data) ? json.data : [],
                    audit: Array.isArray(json.audit) ? json.audit : []
                };

                appendMessage(assistantMessage);
                chatHistory.push({ role: 'assistant', content: assistantMessage.content });
            } catch (error) {
                appendMessage({
                    role: 'assistant',
                    content: `请求失败：${error.message}`
                });
                chatHistory.push({ role: 'assistant', content: `请求失败：${error.message}` });
            } finally {
                sendBtn.disabled = false;
                promptInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', resetConversation);
        promptInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        initialize();
    </script>
</body>
</html>
