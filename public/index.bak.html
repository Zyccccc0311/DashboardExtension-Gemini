<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Tableau AI 智能助手 Pro</title>
    <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api@master/lib/tableau.extensions.1.latest.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f7f9;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            height: calc(100vh - 30px);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar {
            font-size: 13px;
            color: #718096;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #cbd5e0;
        }

        .status-dot.active {
            background-color: #48bb78;
            box-shadow: 0 0 8px rgba(72, 187, 120, 0.4);
        }

        details {
            margin-bottom: 15px;
        }

        summary {
            font-size: 13px;
            color: #4a5568;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            user-select: none;
        }

        summary:hover {
            color: #2b6cb0;
        }

        .ds-list {
            margin: 8px 0 0 0;
            padding-left: 20px;
            font-size: 12px;
            color: #4a5568;
        }

        .ds-list li {
            margin-bottom: 8px;
        }

        .luid-tag {
            background: #edf2f7;
            color: #805ad5;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        #response-area {
            flex-grow: 1;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            background-color: #ffffff;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.6;
        }

        .table-wrapper {
            width: 100%;
            max-height: 300px;
            overflow: auto;
            border: 1px solid #edf2f7;
            border-radius: 4px;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: left;
            min-width: 600px;
        }

        th {
            background-color: #f8fafc;
            color: #4a5568;
            font-weight: 600;
            padding: 10px;
            border-bottom: 2px solid #edf2f7;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid #edf2f7;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tr:hover {
            background-color: #f7fafc;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:disabled {
            background-color: #a0aec0;
        }

        #download-btn {
            background-color: #38a169;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3>🤖 Tableau x Gemini v1.7 (Hybrid Mode)</h3>

        <div class="status-bar">
            <div style="display: flex; align-items: center; gap: 6px;">
                <span id="status-dot" class="status-dot"></span>
                <span id="status-text">初始化中...</span>
            </div>
            <div id="ds-info"></div>
        </div>

        <details id="ds-flag">
            <summary>🚩 当前仪表板数据源及 LUID (点击展开)</summary>
            <div id="ds-debug-info"
                style="padding: 10px; background: #faf5ff; border: 1px dashed #d6bcfa; border-radius: 6px; margin-top: 8px; max-height: 150px; overflow-y: auto;">
                <span style="color: #a0aec0; font-size: 12px;">正在扫描数据源...</span>
            </div>
        </details>

        <div id="response-area">准备就绪，请输入分析指令。</div>

        <div class="controls">
            <input type="text" id="prompt-input" value="帮我把订单日期过滤到2025年，并提取华东区利润最高的5个产品。">
            <button id="action-btn" disabled>咨询 AI</button>
            <button id="download-btn">下载 CSV</button>
        </div>
    </div>

    <script>
        const responseArea = document.getElementById('response-area');
        const actionBtn = document.getElementById('action-btn');
        const downloadBtn = document.getElementById('download-btn');
        const promptInput = document.getElementById('prompt-input');

        let currentTableData = null;

        async function extractSchema() {
            const dashboard = tableau.extensions.dashboardContent.dashboard;
            const schemaArray = [];
            for (const ws of dashboard.worksheets) {
                const dss = await ws.getDataSourcesAsync();
                for (const ds of dss) {
                    if (!schemaArray.find(item => item.luid === ds.id)) {
                        const fieldNames = ds.fields.map(f => f.name);
                        schemaArray.push({
                            luid: ds.id,
                            name: ds.name,
                            fields: fieldNames
                        });
                    }
                }
            }
            return schemaArray;
        }

        tableau.extensions.initializeAsync().then(async () => {
            document.getElementById('status-dot').classList.add('active');
            document.getElementById('status-text').innerText = "Tableau 已连接";
            actionBtn.disabled = false;

            try {
                const schema = await extractSchema();
                let debugHtml = `<ul class="ds-list">`;
                schema.forEach(ds => {
                    debugHtml += `<li>
                        <strong>${ds.name}</strong><br/>
                        <span class="luid-tag">LUID: ${ds.luid}</span>
                        <div style="color: #a0aec0; font-size: 11px; margin-top: 4px;">包含字段: ${ds.fields.slice(0, 5).join(', ')}${ds.fields.length > 5 ? '...' : ''} (共 ${ds.fields.length} 个)</div>
                    </li>`;
                });
                debugHtml += `</ul>`;
                document.getElementById('ds-debug-info').innerHTML = debugHtml;
            } catch (e) {
                document.getElementById('ds-debug-info').innerHTML = `<span style="color: #e53e3e; font-size: 12px;">❌ 扫描数据源失败: ${e.message}</span>`;
            }
        });

        function generateHTMLTable(data) {
            if (!data || data.length === 0) return "";
            const headers = Object.keys(data[0]);
            let html = `<div class="table-wrapper"><table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            data.forEach(row => {
                html += `<tr>`;
                headers.forEach(h => html += `<td title="${row[h]}">${row[h]}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
            return html;
        }

        actionBtn.addEventListener('click', async () => {
            const prompt = promptInput.value;
            actionBtn.disabled = true;
            actionBtn.innerText = "分析中...";
            responseArea.innerHTML = "🔍 正在调取数据源并执行分析...";

            try {
                const schemaArray = await extractSchema();

                const superPrompt = `
用户需求: ${prompt}
---
当前仪表板包含的数据源（来自 Tableau Extensions API）:
${JSON.stringify(schemaArray, null, 2)}

⚠️ 注意：上方的 luid 是 Extensions API 内部 ID，不能直接用于 MCP 工具调用！

【操作流程】(严格按顺序执行):
第一步：调用 list-datasources 获取数据源列表。用上方的数据源 name 匹配，找到对应的真正 datasourceLuid（UUID 格式）。
第二步：用真正的 datasourceLuid 调用 get-datasource-metadata，获取精确字段名和类型。
第三步：根据 metadata 返回的字段信息，调用 query-datasource 构造查询。filter 语法遵守 system prompt 中的规范。
第四步：基于返回数据回答用户问题。

【回答格式】:
1. 开头简述查询过程
2. 在回答最后，将明细数据转换为扁平的 JSON 数组并包裹在 [DATA] [/DATA] 标签中
`;

                const res = await fetch('/api/analyze-datasource', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: superPrompt })
                });

                if (!res.ok) throw new Error(`请求失败，状态码: ${res.status}`);

                const json = await res.json();
                const aiText = json.response;

                // 1. 解析数据表格 [DATA]
                const dataMatch = aiText.match(/\[DATA\]([\s\S]*?)\[\/DATA\]/);
                let tableHtml = "";
                if (dataMatch) {
                    const raw = dataMatch[1].replace(/```json/g, '').replace(/```/g, '').trim();
                    try {
                        currentTableData = JSON.parse(raw);
                        tableHtml = generateHTMLTable(currentTableData);
                        downloadBtn.style.display = 'block';
                    } catch (e) {
                        console.error("解析 JSON 数据失败:", e);
                        tableHtml = `<div style="margin-top: 10px; color: red;">⚠️ 数据解析异常: <pre>${raw}</pre></div>`;
                    }
                } else {
                    downloadBtn.style.display = 'none';
                }

                // 💡 2. 解析并执行过滤指令 <FILTER_COMMAND> (新增核心逻辑)
                const filterMatch = aiText.match(/<FILTER_COMMAND>([\s\S]*?)<\/FILTER_COMMAND>/);
                let filterFeedbackHtml = ""; 
                
                if (filterMatch) {
                    try {
                        const commandJson = JSON.parse(filterMatch[1].trim());
                        
                        if (commandJson.action === "filter") {
                            const dashboard = tableau.extensions.dashboardContent.dashboard;
                            
                            // 这里我们遍历所有工作表执行过滤，确保整个 Dashboard 都能联动
                            const filterPromises = dashboard.worksheets.map(ws => {
                                return ws.applyFilterAsync(
                                    commandJson.fieldName,
                                    commandJson.values,
                                    tableau.FilterUpdateType.Replace
                                );
                            });

                            await Promise.all(filterPromises);
                            
                            console.log(`✅ AI 触发仪表盘联动：将 ${commandJson.fieldName} 设为`, commandJson.values);
                            
                            // UI 上的成功反馈框
                            filterFeedbackHtml = `
                            <div style="margin-top: 12px; margin-bottom: 12px; padding: 12px; background-color: #f0fff4; border-left: 4px solid #48bb78; border-radius: 6px; display: flex; align-items: center; gap: 8px;">
                                <span style="font-size: 16px;">✨</span>
                                <span style="color: #276749; font-size: 13px; font-weight: 500;">仪表盘视图已自动联动更新：<b>${commandJson.fieldName}</b> ➡️ ${commandJson.values.join(', ')}</span>
                            </div>`;
                        }
                    } catch (e) {
                        console.error("解析或执行 AI 过滤指令失败:", e);
                        filterFeedbackHtml = `<div style="margin-top: 12px; padding: 10px; background-color: #fff5f5; border-left: 4px solid #f56565; color: #c53030; border-radius: 4px; font-size: 13px;">⚠️ 仪表盘联动过滤执行失败，请检查控制台或确认该字段是否处于查询上下文中。</div>`;
                    }
                }

                // 3. 清理最终展示的纯文本（把这两个机器用的标签都剥离掉）
                const pureText = aiText
                    .replace(/\[DATA\][\s\S]*?\[\/DATA\]/, "")
                    .replace(/<FILTER_COMMAND>[\s\S]*?<\/FILTER_COMMAND>/, "")
                    .trim();

                // 4. 组装最终 UI
                responseArea.innerHTML = `
                    <div style="font-weight: bold; margin-bottom: 10px; color: #2c3e50;">🤖 AI 分析结论：</div>
                    ${filterFeedbackHtml}
                    <div style="white-space: pre-wrap; color: #4a5568;">${pureText}</div>
                    ${tableHtml}
                `;

            } catch (err) {
                responseArea.innerHTML = `<span style="color: #e53e3e;">❌ 错误: ${err.message}</span>`;
            } finally {
                actionBtn.disabled = false;
                actionBtn.innerText = "咨询 AI";
            }
        });

        // 下载逻辑保持不变
        downloadBtn.addEventListener('click', () => {
            if (!currentTableData || currentTableData.length === 0) return;
            const headers = Object.keys(currentTableData[0]);

            const csv = [
                headers.join(','),
                ...currentTableData.map(row =>
                    headers.map(h => {
                        let val = row[h];
                        if (typeof val === 'object' && val !== null) {
                            val = JSON.stringify(val).replace(/"/g, '""');
                        } else if (val === null || val === undefined) {
                            val = '';
                        }
                        return `"${val}"`;
                    }).join(',')
                )
            ].join('\n');

            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Tableau_AI_Report_${new Date().getTime()}.csv`;
            link.click();
        });
    </script>
</body>

</html>
